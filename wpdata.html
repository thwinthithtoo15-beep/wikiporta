<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikiporta Data</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; color: #2d3436; }
        .sidebar { background: #ffffff; border-right: 1px solid #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
        .main-content { padding: 3rem; }
        .data-card { background: #ffffff; border-radius: 12px; border: none; shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 2rem; }
        .infobox-header { background: #0984e3; color: white; padding: 1rem; font-weight: 600; text-align: center; }
        .infobox-row { display: flex; border-bottom: 1px solid #f1f1f1; padding: 0.75rem 1rem; font-size: 0.9rem; }
        .infobox-label { font-weight: 600; width: 40%; color: #636e72; }
        .infobox-value { width: 60%; color: #2d3436; }
        .wiki-text { line-height: 1.8; font-size: 1.1rem; }
        .nav-link { border-radius: 8px; margin-bottom: 5px; transition: 0.3s; color: #636e72; cursor: pointer; }
        .nav-link:hover { background: #f0f3f5; color: #0984e3; }
        .active-page { background: #0984e3 !important; color: white !important; }
        #json-display { background: #2d3436; color: #fab1a0; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 0.8rem; margin-top: 2rem; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 sidebar">
            <h4 class="fw-bold mb-4 px-3">Wikiporta <span class="text-primary">Data</span></h4>
            <div class="nav flex-column" id="page-list"></div>
        </nav>

        <main class="col-md-9 col-lg-10 main-content">
            <div class="row">
                <div class="col-lg-8">
                    <div id="content" class="wiki-text"></div>
                    <div id="json-display" class="d-none"></div>
                </div>
                <div class="col-lg-4">
                    <div id="infobox-container"></div>
                </div>
            </div>
        </main>
    </div>
</div>
<footer class="text-center py-4 mt-5 border-top">
    <p class="text-muted small">© 2026 Wikiporta by Thwin. All Rights Reserved.</p>
    <a href="https://www.copyright01.com/certificat/5D9BADA3FA5D9BE59413498902D65077" target="_blank" rel="noopener">
      <img src="https://www.copyright01.com/badge/5D9BADA3FA5D9BE59413498902D65077.svg?theme=blue&style=detailed" alt="Protected by Copyright01" width="300">
    </a>
</footer>

<script>
    const wikiData = {
        "Myanmar": {
            "content": "# Myanmar\nMyanmar is a country in Southeast Asia. It is the second largest country in the region.",
            "data": {
                "Capital": "Naypyidaw",
                "Population": "54.1 Million",
                "Area": "676,578 km²",
                "Currency": "Kyat",
                "Language": "Burmese"
            }
        },
        "Hlegu": {
            "content": "# Hlegu\nHlegu is a town in the Yangon Region of Myanmar. It is the administrative seat of Hlegu Township.",
            "data": {
                "Region": "Yangon",
                "District": "North Yangon",
                "Elevation": "18 m",
                "Country": "Myanmar"
            }
        },
        "JSON_Test": {
            "content": "# JSON Feature Test\nThis page demonstrates data-driven rendering without an infobox.",
            "data": null
        }
    };

    function renderInfobox(data, title) {
        if (!data) return '';
        let rows = Object.entries(data).map(([label, value]) => `
            <div class="infobox-row">
                <div class="infobox-label">${label}</div>
                <div class="infobox-value">${value}</div>
            </div>
        `).join('');
        
        return `
            <div class="data-card shadow-sm">
                <div class="infobox-header">${title} Data</div>
                ${rows}
            </div>
        `;
    }

    function loadWikiPage(id) {
        const page = wikiData[id];
        document.getElementById('content').innerHTML = marked.parse(page.content);
        
        const infoboxContainer = document.getElementById('infobox-container');
        const jsonDisplay = document.getElementById('json-display');
        
        if (page.data) {
            infoboxContainer.innerHTML = renderInfobox(page.data, id);
            jsonDisplay.innerHTML = `<pre>DATA SOURCE (${id}.json):\n${JSON.stringify(page.data, null, 2)}</pre>`;
            jsonDisplay.classList.remove('d-none');
        } else {
            infoboxContainer.innerHTML = '';
            jsonDisplay.classList.add('d-none');
        }

        updateSidebar(id);
    }

    function updateSidebar(activeId) {
        const list = document.getElementById('page-list');
        list.innerHTML = Object.keys(wikiData).map(id => `
            <a class="nav-link px-3 py-2 ${id === activeId ? 'active-page' : ''}" onclick="loadWikiPage('${id}')">
                ${id}
            </a>
        `).join('');
    }

    updateSidebar('Myanmar');
    loadWikiPage('Myanmar');
</script>

</body>
</html>
